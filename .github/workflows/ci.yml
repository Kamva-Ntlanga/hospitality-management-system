name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install fastapi uvicorn pydantic httpx pytest pytest-cov
    
    - name: Run tests with coverage
      run: |
        python -m pytest tests/ -v --cov=src --cov=services --cov=api --cov-report=xml
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: |
          .coverage
          coverage.xml
          pytest_output.txt

  build:
    name: Build and Package
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build wheel
    
    - name: Build Python package
      run: |
        python -m build
    
    - name: Create distribution archive
      run: |
        mkdir -p dist
        cp -r src services api repositories factories future_stubs tests *.md dist/ 2>/dev/null || true
        echo "HotelHub Build - $(date)" > dist/build_info.txt
        echo "Commit SHA: ${{ github.sha }}" >> dist/build_info.txt
    
    - name: Upload release artifact
      uses: actions/upload-artifact@v4
      with:
        name: hotelhub-release
        path: dist/
        retention-days: 30
